<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Pantry Panel</title>
<style>
  :root{
    --paper: #efe7d2;
    --paper-dark: #e3d8bc;
    --ink: #2b2620;
    --ink-soft: #5a5347;
    --avocado: #5b7553;
    --avocado-dark: #435a3d;
    --tomato: #c1442e;
    --tomato-dark: #973526;
    --mustard: #d9a441;
    --navy: #2e3a46;
    --line: rgba(43,38,32,0.18);
    --card: #f8f3e6;
    --shadow: 0 3px 0 rgba(43,38,32,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(rgba(43,38,32,0.035) 1px, transparent 1px);
    background-size:14px 14px;
    color:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",Verdana,sans-serif;
    min-height:100vh;
  }
  .display{
    font-family:Impact,"Arial Narrow",Haettenschweiler,"Franklin Gothic Bold",sans-serif;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .mono{ font-family:"Courier New",Courier,monospace; }

  #app{ max-width:900px; margin:0 auto; padding:18px 16px 60px; }

  /* ---- ticket header / stepper ---- */
  .ticket{
    background:var(--ink);
    color:var(--paper);
    border-radius:10px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    box-shadow:var(--shadow);
    margin-bottom:20px;
  }
  .ticket h1{
    font-size:22px;
    margin:0;
    line-height:1.05;
  }
  .ticket .sub{ font-size:11px; color:var(--mustard); letter-spacing:1.5px; }
  .steps{ display:flex; gap:6px; }
  .steps span{
    width:9px;height:9px;border-radius:50%;
    background:rgba(255,255,255,0.25);
    display:inline-block;
  }
  .steps span.on{ background:var(--mustard); }

  /* ---- generic card ---- */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px;
    box-shadow:var(--shadow);
    margin-bottom:16px;
  }
  .card h2{ margin-top:0; font-size:19px; }
  .muted{ color:var(--ink-soft); font-size:14px; }

  button{ font-family:inherit; cursor:pointer; }
  .btn{
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:7px;
    padding:11px 18px;
    font-size:14px;
    font-weight:bold;
    box-shadow:var(--shadow);
  }
  .btn:active{ transform:translateY(2px); box-shadow:none; }
  .btn.ghost{
    background:transparent;
    color:var(--ink);
    border:2px solid var(--ink);
    box-shadow:none;
  }
  .btn.tomato{ background:var(--tomato); box-shadow:0 3px 0 var(--tomato-dark); }
  .btn.avocado{ background:var(--avocado); box-shadow:0 3px 0 var(--avocado-dark); }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn.small{ padding:7px 12px; font-size:12px; border-radius:6px; }

  /* ---- profile list ---- */
  .profile-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:10px;
    background:#fbf8ef;
  }
  .profile-row .name{ font-weight:bold; font-size:16px; }
  .profile-row .status{ font-size:12px; color:var(--ink-soft); }
  .profile-row .status.done{ color:var(--avocado-dark); font-weight:bold; }
  .profile-row .actions{ display:flex; gap:8px; }
  .add-row{ display:flex; gap:8px; margin-top:14px; }
  .add-row input{
    flex:1; padding:10px 12px; border-radius:7px;
    border:2px solid var(--line); font-size:14px; background:#fff;
  }

  /* ---- survey ---- */
  .survey-head{
    position:sticky; top:0; z-index:5;
    background:var(--paper);
    padding:10px 0 14px;
  }
  .progress-track{
    height:8px; background:var(--paper-dark); border-radius:5px; overflow:hidden;
    border:1px solid var(--line);
  }
  .progress-fill{ height:100%; background:var(--mustard); transition:width 0.2s; }
  .category-block h3{
    font-size:13px; letter-spacing:1.5px; color:var(--navy);
    border-bottom:2px solid var(--navy);
    padding-bottom:4px; margin:22px 0 10px;
  }
  .ing-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 4px; border-bottom:1px dashed var(--line);
    gap:10px;
  }
  .ing-name{ font-size:14.5px; }
  .stamp-group{ display:flex; gap:5px; flex-shrink:0; }
  .stamp{
    width:30px; height:30px; border-radius:50%;
    border:2px solid var(--ink);
    background:#fff;
    font-size:13px; font-weight:bold;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.08s;
    opacity:0.5;
  }
  .stamp:hover{ opacity:0.85; }
  .stamp.active{
    opacity:1;
    color:#fff;
    transform:scale(1.12);
    box-shadow:0 2px 0 rgba(43,38,32,0.3);
  }
  .stamp[data-rating="1"].active{ background:var(--tomato); border-color:var(--tomato-dark); }
  .stamp[data-rating="2"].active{ background:#d9784a; border-color:#a85a35; }
  .stamp[data-rating="3"].active{ background:var(--mustard); border-color:#a67a2e; color:var(--ink); }
  .stamp[data-rating="4"].active{ background:#8aa680; border-color:var(--avocado); }
  .stamp[data-rating="5"].active{ background:var(--avocado); border-color:var(--avocado-dark); }
  .scale-legend{ display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-soft); margin-top:4px; padding:0 2px; }

  .survey-foot{
    position:sticky; bottom:0; background:var(--paper);
    padding:14px 0 4px; display:flex; justify-content:space-between; gap:10px;
    border-top:1px solid var(--line); margin-top:10px;
  }

  /* ---- cuisine grid ---- */
  .cuisine-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;
  }
  .filter-row{
    display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;
  }
  .filter-field{ flex:1; min-width:150px; }
  .filter-field label{
    display:block; font-size:11px; letter-spacing:1px; text-transform:uppercase;
    color:var(--ink-soft); margin-bottom:4px;
  }
  .filter-field select{
    width:100%; padding:9px 10px; border-radius:7px;
    border:2px solid var(--line); font-size:14px; background:#fff; color:var(--ink);
  }
  .badge-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .meta-badge{
    display:inline-block; font-size:11px; font-weight:bold;
    background:var(--paper-dark); color:var(--ink); padding:2px 8px; border-radius:20px;
  }
  .cuisine-tile{
    background:#fbf8ef; border:2px solid var(--line); border-radius:10px;
    padding:18px 10px; text-align:center; box-shadow:var(--shadow);
  }
  .cuisine-tile:hover{ border-color:var(--mustard); }
  .cuisine-tile .emoji{ font-size:30px; display:block; margin-bottom:8px; }
  .cuisine-tile .label{ font-size:13px; font-weight:bold; letter-spacing:0.5px; }

  /* ---- results ---- */
  .recipe-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
  }
  .recipe-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:16px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .recipe-card::before{
    content:"";
    position:absolute; top:0; right:14px; width:14px; height:14px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    border-left:1px solid var(--line);
    transform:rotate(45deg) translateY(-7px);
  }
  .recipe-card h3{ margin:6px 0 4px; font-size:17px; }
  .match-tag{
    display:inline-block; font-size:11px; font-weight:bold;
    background:var(--avocado); color:#fff; padding:2px 8px; border-radius:20px;
    margin-bottom:8px;
  }
  .match-tag.warn{ background:var(--mustard); color:var(--ink); }
  .recipe-card .ing-preview{ font-size:12.5px; color:var(--ink-soft); margin-bottom:10px; }
  .detail-list{ list-style:none; padding:0; margin:10px 0; }
  .detail-list li{
    font-size:13.5px; padding:5px 8px; border-radius:5px; margin-bottom:4px;
    display:flex; align-items:center; gap:6px;
  }
  .detail-list li.liked{ background:rgba(91,117,83,0.15); }
  .detail-list li.disliked{ background:rgba(193,68,46,0.15); text-decoration:line-through; color:var(--tomato-dark); }
  .steps-list{ padding-left:18px; font-size:13.5px; line-height:1.6; }
  .empty-state{ text-align:center; padding:30px 10px; color:var(--ink-soft); }
  .empty-state .big{ font-size:38px; display:block; margin-bottom:8px; }
  .top-link{ background:none; border:none; color:var(--navy); text-decoration:underline; font-size:13px; padding:0; margin-bottom:12px; display:inline-block; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ DATA ============ */
const INGREDIENT_CATEGORIES = {
  "Vegetables": ["Onion","Garlic","Bell Pepper","Tomato","Broccoli","Cauliflower","Carrot","Zucchini","Eggplant","Spinach","Mushroom","Potato","Sweet Potato","Corn","Peas","Green Beans","Cabbage","Kale","Cucumber","Avocado"],
  "Fruits": ["Lemon","Lime","Orange","Apple","Mango","Pineapple","Raisins","Coconut","Banana"],
  "Meats & Seafood": ["Chicken","Beef","Pork","Bacon","Ground Beef","Shrimp","Salmon","Tuna","Sausage","Turkey","Lamb","Chorizo","Crab","Duck","Anchovy"],
  "Herbs & Spices": ["Basil","Oregano","Thyme","Rosemary","Cilantro","Parsley","Mint","Dill","Cumin","Paprika","Chili Powder","Cinnamon","Turmeric","Ginger","Garam Masala","Curry Powder","Black Pepper","Red Pepper Flakes","Bay Leaf","Saffron"],
  "Cheese & Dairy": ["Mozzarella","Parmesan","Cheddar","Feta","Ricotta","Cream Cheese","Yogurt","Sour Cream","Butter","Goat Cheese"],
  "Grains & Starches": ["Rice","Pasta","Bread","Tortilla","Quinoa","Noodles","Rice Noodles","Couscous","Naan","Polenta"],
  "Legumes & Nuts": ["Black Beans","Chickpeas","Lentils","Kidney Beans","Peanuts","Cashews","Almonds","Tofu","Edamame","Pine Nuts"],
  "Pantry & Other": ["Soy Sauce","Coconut Milk","Olive Oil","Vinegar","Honey","Eggs"]
};
const ALL_INGREDIENTS = Object.values(INGREDIENT_CATEGORIES).flat();
const INGREDIENT_LOOKUP = {};
ALL_INGREDIENTS.forEach(name => { INGREDIENT_LOOKUP[name.toLowerCase()] = name; });
function normalizeIngredient(name){
  return INGREDIENT_LOOKUP[String(name).trim().toLowerCase()] || null;
}
function ratingForProfile(profileId, ingredientName){
  const master = normalizeIngredient(ingredientName);
  if(!master) return null; // not one of our tracked 100 ingredients — no rating to check
  const rating = (answersByProfile[profileId] || {})[master];
  return rating == null ? null : rating;
}

function generateRecipes(){
  const generated = [];
  const seenNames = new Set(RECIPES.map(r => r.name));
  for(const cuisine in GENERATOR_CONFIG){
    const cfg = GENERATOR_CONFIG[cuisine];
    for(const protein of cfg.proteins){
      for(const veg of cfg.vegetables){
        for(const tmpl of cfg.templates){
          const name = tmpl.name(protein, veg);
          if(seenNames.has(name)) continue; // skip anything that collides with a hand-written recipe
          seenNames.add(name);
          const ingredients = [...new Set(tmpl.ingredients(protein, veg))];
          generated.push({ name, cuisine, ingredients, steps: tmpl.steps(protein, veg) });
        }
      }
    }
  }
  return generated;
}
const ALL_RECIPES = RECIPES.concat(generateRecipes());

function uid(){ return 'p_' + Math.random().toString(36).slice(2,10); }

/* ============ STORAGE ============
   Inside Claude, window.storage persists per-viewer automatically — perfect
   for sharing this app, since everyone who opens it keeps their own separate
   set of eaters. If this file is ever opened outside Claude (hosted on its
   own, or double-clicked as a local file), window.storage won't exist, so we
   fall back to the browser's own localStorage for that same on-device,
   per-person persistence. */
const usingFallbackStorage = (typeof window.storage === 'undefined');
const localStore = {
  async get(key){
    const raw = localStorage.getItem('pantrypanel:' + key);
    if(raw === null) throw new Error('not found');
    return {key, value: raw};
  },
  async set(key, value){
    localStorage.setItem('pantrypanel:' + key, value);
    return {key, value};
  },
  async delete(key){
    localStorage.removeItem('pantrypanel:' + key);
    return {key, deleted:true};
  }
};
const store = usingFallbackStorage ? localStore : window.storage;

async function loadAll(){
  try{
    const p = await store.get('profiles');
    profiles = p ? JSON.parse(p.value) : [];
  }catch(e){ profiles = []; }
  answersByProfile = {};
  for(const pr of profiles){
    try{
      const a = await store.get('answers:' + pr.id);
      answersByProfile[pr.id] = a ? JSON.parse(a.value) : {};
    }catch(e){ answersByProfile[pr.id] = {}; }
  }
  view = "home";
  render();
}
async function saveProfiles(){
  try{ await store.set('profiles', JSON.stringify(profiles)); }
  catch(e){ console.error('save profiles failed', e); }
}
async function saveAnswers(profileId){
  try{ await store.set('answers:' + profileId, JSON.stringify(answersByProfile[profileId] || {})); }
  catch(e){ console.error('save answers failed', e); }
}

/* ============ HELPERS ============ */
function surveyDone(profileId){
  const a = answersByProfile[profileId] || {};
  return Object.keys(a).length > 0;
}
function anyProfileSurveyed(){
  return profiles.some(p => surveyDone(p.id));
}

/* ============ RENDER ============ */
function render(){
  const app = $('#app');
  const stepIndex = {loading:0, home:0, survey:1, cuisine:2, results:3}[view] ?? 0;
  const stepsHtml = [0,1,2,3].map(i => `<span class="${i<=stepIndex?'on':''}"></span>`).join('');
  let body = '';
  if(view === 'loading') body = `<div class="empty-state"><span class="big">🍽️</span>Loading your pantry panel…</div>`;
  else if(view === 'home') body = renderHome();
  else if(view === 'survey') body = renderSurvey();
  else if(view === 'cuisine') body = renderCuisine();
  else if(view === 'results') body = renderResults();

  app.innerHTML = `
    <div class="ticket">
      <div>
        <div class="sub">THE PANTRY PANEL</div>
        <h1 class="display">${headerTitle()}</h1>
      </div>
      <div class="steps">${stepsHtml}</div>
    </div>
    ${body}
  `;
  attachHandlers();
}

function headerTitle(){
  if(view==='home') return "Who's Eating?";
  if(view==='survey'){
    const p = profiles.find(x=>x.id===surveyProfileId);
    return p ? p.name + "'s Survey" : 'Survey';
  }
  if(view==='cuisine') return 'Pick A Cuisine';
  if(view==='results') return selectedCuisine + ' Night';
  return 'Loading';
}

function renderHome(){
  const rows = profiles.map(p => {
    const done = surveyDone(p.id);
    return `
    <div class="profile-row">
      <div>
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="status ${done?'done':''}">${done ? '✓ Survey complete' : 'Survey not started'}</div>
      </div>
      <div class="actions">
        <button class="btn ghost small" data-action="survey" data-id="${p.id}">${done?'Retake':'Start'} Survey</button>
        <button class="btn tomato small" data-action="delete" data-id="${p.id}">Remove</button>
      </div>
    </div>`;
  }).join('') || `<div class="empty-state"><span class="big">🧑‍🍳</span>Add your first picky eater below to get started.</div>`;

  const canSearch = anyProfileSurveyed();

  return `
    <div class="card">
      <h2>Eater Profiles</h2>
      <p class="muted">Add a profile for each person, then have them run through the 100-ingredient survey once. It's saved for next time.</p>
      ${rows}
      <div class="add-row">
        <input type="text" id="newName" placeholder="e.g. Jonah, Mom, Uncle Rick..." maxlength="30">
        <button class="btn avocado" data-action="add">Add Eater</button>
      </div>
    </div>
    <div class="card" style="text-align:center;">
      <h2>Ready To Cook?</h2>
      <p class="muted">${canSearch ? "Pick a cuisine and we'll find dishes everyone at the table can agree on." : 'Complete at least one survey to unlock cuisine matching.'}</p>
      <button class="btn" data-action="goCuisine" ${canSearch?'':'disabled'}>Find Recipes →</button>
    </div>
  `;
}

function renderSurvey(){
  const answers = answersByProfile[surveyProfileId] || {};
  const answeredCount = Object.keys(answers).length;
  const pct = Math.round((answeredCount / ALL_INGREDIENTS.length) * 100);

  const categories = Object.entries(INGREDIENT_CATEGORIES).map(([cat, items]) => {
    const rows = items.map(ing => {
      const rating = answers[ing] || null;
      const buttons = [1,2,3,4,5].map(n =>
        `<button class="stamp ${rating===n?'active':''}" data-rating="${n}" title="${n}/5">${n}</button>`
      ).join('');
      return `
      <div class="ing-row">
        <div class="ing-name">${ing}</div>
        <div class="stamp-group" data-ing="${escapeAttr(ing)}">${buttons}</div>
      </div>`;
    }).join('');
    return `<div class="category-block"><h3 class="display">${cat}</h3>${rows}</div>`;
  }).join('');

  return `
    <button class="top-link" data-action="backHome">← Back to profiles</button>
    <div class="survey-head card" style="padding:14px 20px;">
      <div class="muted" style="margin-bottom:2px;">Rate each ingredient 1-5. Leave it blank if it doesn't matter either way.</div>
      <div class="scale-legend"><span>1 = Hate it</span><span>3 = Take it or leave it</span><span>5 = Love it</span></div>
      <div class="progress-track" style="margin-top:6px;"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="muted" style="margin-top:6px;font-size:12px;">${answeredCount} of ${ALL_INGREDIENTS.length} ingredients rated</div>
    </div>
    <div class="card">${categories}</div>
    <div class="survey-foot">
      <button class="btn ghost" data-action="backHome">Save & Exit</button>
      <button class="btn avocado" data-action="finishSurvey">Finish Survey</button>
    </div>
  `;
}

  const tiles = Object.entries(CUISINE_META).map(([name, emoji]) => `
    <button class="cuisine-tile" data-action="pickCuisine" data-cuisine="${name}">
      <span class="emoji">${emoji}</span>
      <span class="label display">${name}</span>

  const budgetOptions = [["","Any"],["$","$ — Budget-friendly"],["$$","$$ — Moderate"],["$$$","$$$ — Splurge"]]
    .map(([val,label]) => `<option value="${val}" ${selectedBudget===(val||null)?'selected':''}>${label}</option>`).join('');
  return `
    <button class="top-link" data-action="backHome">← Back to profiles</button>
    <div class="card">
      <h2>What's for dinner?</h2>

      <div class="filter-row">
        <div class="filter-field">
          <label>Cooking Time</label>
          <select id="filterTime">${timeOptions}</select>
        </div>
        <div class="filter-field">
          <label>Ingredient Budget</label>
          <select id="filterBudget">${budgetOptions}</select>

      </div>
      <div class="cuisine-grid">${tiles}</div>

/* ---- Live recipe generation via Claude ---- */
function buildPreferenceSummary(){
  const surveyed = profiles.filter(p => surveyDone(p.id));
  return surveyed.map(p => {
    const a = answersByProfile[p.id] || {};
    const loved = Object.entries(a).filter(([,v]) => v >= 4).map(([k,v]) => `${k} (${v}/5)`);
    const disliked = Object.entries(a).filter(([,v]) => v <= 2).map(([k,v]) => `${k} (${v}/5)`);
    return `${p.name}: loves [${loved.join(', ') || 'nothing rated that high'}]; dislikes [${disliked.join(', ') || 'nothing rated that low'}]`;
  }).join('\n');
}

async function fetchLiveRecipes(cuisine, excludeNames){
  const prefsText = buildPreferenceSummary();
  const excludeText = excludeNames.length
    ? `Do not repeat any of these dish names, which have already been shown: ${excludeNames.join(', ')}.`
    : '';
  const timeText = selectedMaxTime
    ? `- Every recipe must be realistically achievable in about ${selectedMaxTime} minutes or less, start to finish (prep + cook).`
    : '';
  const budgetText = selectedBudget
    ? `- Every recipe's ingredient cost should be roughly "${selectedBudget}" or cheaper, where $ = budget-friendly/pantry staples, $$ = moderate, $$$ = splurge/specialty ingredients.`
    : '';
  const prompt = `Generate 6 real, diverse ${cuisine} cuisine recipes suitable for a family meal.
Here are the eaters and how they rated ingredients on a 1-5 scale (1 = hate it, 5 = love it; anything not listed means no strong opinion):
${prefsText || 'No one has rated ingredients yet — suggest broadly crowd-pleasing options.'}

Rules:
- Never include an ingredient any single person rated 1.
- Try to avoid ingredients rated 2 unless the dish doesn't work without it.
- Ingredients rated 3 or unrated are perfectly fine to include.
- Prioritize recipes that include several ingredients people rated 4 or 5.
${timeText}
${budgetText}
${excludeText}

Respond with ONLY a JSON array (no markdown fences, no commentary before or after) of exactly 6 objects. Each object must have exactly these fields:
"name" (string), "description" (one short sentence), "ingredients" (array of plain ingredient name strings, no quantities), "steps" (array of 4 short instruction strings), "timeMinutes" (integer, total realistic prep+cook time), "costLevel" (string, exactly one of "$", "$$", "$$$" representing approximate total ingredient cost).`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if(!response.ok) throw new Error('API request failed: ' + response.status);
  const data = await response.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  if(!Array.isArray(parsed)) throw new Error('Unexpected response shape');
  return parsed;
}

const PRICEY_INGREDIENTS = ["Shrimp","Salmon","Crab","Lamb","Duck","Saffron","Tuna","Pine Nuts","Cashews"];
const MID_INGREDIENTS = ["Chicken","Beef","Ground Beef","Pork","Turkey","Bacon","Sausage","Chorizo","Feta","Goat Cheese"];
function estimateFallbackMeta(recipe){
  const timeMinutes = Math.max(15, Math.min(60, 15 + recipe.steps.length * 8));
  let costLevel = "$";
  if(recipe.ingredients.some(i => PRICEY_INGREDIENTS.includes(i))) costLevel = "$$$";
  else if(recipe.ingredients.some(i => MID_INGREDIENTS.includes(i))) costLevel = "$$";
  return { timeMinutes, costLevel };
}
const COST_RANK = {"$":1, "$$":2, "$$$":3};

function recipeHasHardConflict(recipe){
  const surveyed = profiles.filter(p => surveyDone(p.id));
  return recipe.ingredients.some(ing => surveyed.some(p => ratingForProfile(p.id, ing) === 1));
}

async function loadResultsFor(cuisine, append){
  loadingResults = true;
  resultsError = null;
  if(!append){ liveRecipes = []; shownRecipeNames = []; usingFallback = false; }
  render();
  const targetCount = 6;
  try{
    let collected = [];
    let rejectedNames = [];
    let attempts = 0;
    const maxAttempts = 3; // cap retries so a stubborn model can't loop forever or run up calls
    while(collected.length < targetCount && attempts < maxAttempts){
      attempts++;
      const excludeList = shownRecipeNames.concat(rejectedNames);
      const batch = await fetchLiveRecipes(cuisine, excludeList);
      for(const r of batch){
        if(collected.length >= targetCount) break;
        if(recipeHasHardConflict(r)){
          rejectedNames.push(r.name); // silently discard — don't show, don't re-request the same one
        } else {
          collected.push(r);
        }
      }
    }
    if(collected.length === 0) throw new Error('No conflict-free recipes came back after ' + attempts + ' attempts');
    liveRecipes = append ? liveRecipes.concat(collected) : collected;
    shownRecipeNames = shownRecipeNames.concat(collected.map(r => r.name), rejectedNames);
    usingFallback = false;
  }catch(e){
    console.error('Live recipe fetch failed, falling back to offline set:', e);
    let fallbackPool = ALL_RECIPES.filter(r => r.cuisine === cuisine)
      .map(r => ({...r, ...estimateFallbackMeta(r)}));
    if(selectedMaxTime) fallbackPool = fallbackPool.filter(r => r.timeMinutes <= selectedMaxTime);
    if(selectedBudget) fallbackPool = fallbackPool.filter(r => COST_RANK[r.costLevel] <= COST_RANK[selectedBudget]);
    if(fallbackPool.length === 0){
      resultsError = `Couldn't reach the recipe engine, and there's no offline backup for "${cuisine}" matching those filters. Try loosening the time or budget filter, or try again.`;
      liveRecipes = [];
    } else {
      usingFallback = true;
      liveRecipes = rankFallbackRecipes(fallbackPool).slice(0, 10);
    }
  }
  loadingResults = false;
  render();
}

function rankFallbackRecipes(pool){
  const surveyed = profiles.filter(p => surveyDone(p.id));
  const scored = pool.map(r => {
    let conflictSeverity = 0, lovedScore = 0;
    for(const p of surveyed){
      const a = answersByProfile[p.id] || {};
      r.ingredients.forEach(ing => {
        const rating = a[ing];
        if(rating == null) return;
        if(rating <= 2) conflictSeverity += (3 - rating);
        if(rating >= 4) lovedScore += (rating - 3);
      });
    }
    return {...r, conflictSeverity, lovedScore};
  });
  const safe = scored.filter(s => s.conflictSeverity === 0).sort((a,b) => b.lovedScore - a.lovedScore);
  const risky = scored.filter(s => s.conflictSeverity > 0).sort((a,b) => a.conflictSeverity - b.conflictSeverity || b.lovedScore - a.lovedScore);
  return [...safe, ...risky];
}

function ratingTagFor(ingredients){
  const surveyed = profiles.filter(p => surveyDone(p.id));
  let loves = 0, hates = 0;
  ingredients.forEach(ing => {
    surveyed.forEach(p => {
      const rating = ratingForProfile(p.id, ing);
      if(rating == null) return;
      if(rating <= 2) hates++;
      if(rating >= 4) loves++;
    });
  });
  return {loves, hates};
}

function renderResults(){
  if(loadingResults){
    return `
      <button class="top-link" data-action="backCuisine">← Choose a different cuisine</button>
      <div class="empty-state"><span class="big">👩‍🍳</span>Asking the recipe engine for ${selectedCuisine} dishes that fit your table…</div>
    `;
  }
  if(resultsError){
    return `
      <button class="top-link" data-action="backCuisine">← Choose a different cuisine</button>
      <div class="empty-state"><span class="big">⚠️</span>${escapeHtml(resultsError)}</div>
      <div style="text-align:center;"><button class="btn" data-action="retryResults">Try Again</button></div>
    `;
  }
  const matches = liveRecipes || [];
  if(matches.length === 0){
    return `
      <button class="top-link" data-action="backCuisine">← Choose a different cuisine</button>
      <div class="empty-state"><span class="big">🤷</span>No dishes came back for ${selectedCuisine}. Try again or pick another cuisine.</div>
    `;
  }
  const filterBits = [];
  if(selectedMaxTime) filterBits.push(`${selectedMaxTime} min or less`);
  if(selectedBudget) filterBits.push(`${selectedBudget} or cheaper`);
  const filterSuffix = filterBits.length ? ` — filtered to ${filterBits.join(', ')}` : '';
  const showingLabel = usingFallback
    ? `Showing ${matches.length} offline suggestions (couldn't reach the recipe engine)${filterSuffix}`
    : `Showing ${matches.length} freshly generated ${selectedCuisine} matches${filterSuffix}`;
  const cards = matches.map((recipe, idx) => {
    const isOpen = expandedRecipe === idx;
    const {loves, hates} = ratingTagFor(recipe.ingredients);
    const tagClass = hates > 0 ? 'match-tag warn' : 'match-tag';
    const tagText = hates > 0
      ? `${hates} disliked ingredient${hates>1?'s':''}`
      : `${loves} loved pick${loves!==1?'s':''}, zero complaints`;
    const metaBadges = `
      ${recipe.timeMinutes ? `<span class="meta-badge">⏱ ${recipe.timeMinutes} min</span>` : ''}
      ${recipe.costLevel ? `<span class="meta-badge">💲 ${escapeHtml(recipe.costLevel)}</span>` : ''}
    `;
    if(!isOpen){
      return `
      <div class="recipe-card" data-action="openRecipe" data-idx="${idx}">
        <div class="badge-row"><span class="${tagClass}">${tagText}</span>${metaBadges}</div>
        <h3>${escapeHtml(recipe.name)}</h3>
        <div class="ing-preview">${escapeHtml(recipe.ingredients.join(', '))}</div>
        <button class="btn small ghost">View Recipe</button>
      </div>`;
    }
    const surveyed = profiles.filter(p => surveyDone(p.id));
    const list = recipe.ingredients.map(ing => {
      const dislikedBy = surveyed.filter(p => ratingForProfile(p.id, ing) !== null && ratingForProfile(p.id, ing) <= 2).map(p=>p.name);
      const likedBy = surveyed.filter(p => ratingForProfile(p.id, ing) !== null && ratingForProfile(p.id, ing) >= 4).map(p=>p.name);
      let cls = '';
      let note = '';
      if(dislikedBy.length){ cls='disliked'; note = ` — ${dislikedBy.join(', ')} not a fan`; }
      else if(likedBy.length){ cls='liked'; note = ` — ${likedBy.join(', ')} loves this`; }
      return `<li class="${cls}">${cls==='liked'?'✓':cls==='disliked'?'✕':'•'} ${escapeHtml(ing)}${note}</li>`;
    }).join('');
    const steps = recipe.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('');
    return `
      <div class="recipe-card" data-action="closeRecipe" data-idx="${idx}">
        <div class="badge-row"><span class="${tagClass}">${tagText}</span>${metaBadges}</div>
        <h3>${escapeHtml(recipe.name)}</h3>
        ${recipe.description ? `<div class="muted" style="margin-bottom:8px;">${escapeHtml(recipe.description)}</div>` : ''}
        <div class="muted" style="font-size:12px;margin-bottom:4px;">INGREDIENTS</div>
        <ul class="detail-list">${list}</ul>
        <div class="muted" style="font-size:12px;margin:10px 0 4px;">RECIPE</div>
        <ol class="steps-list">${steps}</ol>
        <button class="btn small ghost" style="margin-top:8px;">Close</button>
      </div>`;
  }).join('');

  return `
    <button class="top-link" data-action="backCuisine">← Choose a different cuisine</button>
    <div class="muted" style="margin-bottom:10px;font-size:12px;">${showingLabel}</div>
    <div class="recipe-grid">${cards}</div>
    ${!usingFallback ? `<div style="text-align:center;margin-top:18px;"><button class="btn ghost" data-action="showMore">🔀 Show 6 More</button></div>` : ''}
  `;
}

/* ============ EVENTS ============ */
function attachHandlers(){
  const app = $('#app');

  app.querySelectorAll('[data-action="add"]').forEach(btn => btn.onclick = async () => {
    const input = $('#newName');
    const name = (input.value || '').trim();
    if(!name) return;
    const id = uid();
    profiles.push({id, name});
    answersByProfile[id] = {};
    await saveProfiles();
    surveyProfileId = id;
    view = 'survey';
    render();
  });
  const newNameInput = $('#newName');
  if(newNameInput){
    newNameInput.onkeydown = (e) => { if(e.key === 'Enter'){ app.querySelector('[data-action="add"]').click(); } };
  }

  app.querySelectorAll('[data-action="survey"]').forEach(btn => btn.onclick = () => {
    surveyProfileId = btn.dataset.id;
    view = 'survey';
    render();
  });

  app.querySelectorAll('[data-action="delete"]').forEach(btn => btn.onclick = async () => {
    const id = btn.dataset.id;
    profiles = profiles.filter(p => p.id !== id);
    delete answersByProfile[id];
    await saveProfiles();
    try{ await store.delete('answers:' + id); }catch(e){}
    render();
  });

  const goCuisineBtn = app.querySelector('[data-action="goCuisine"]');
  if(goCuisineBtn) goCuisineBtn.onclick = () => { view = 'cuisine'; render(); };

  app.querySelectorAll('[data-action="backHome"]').forEach(btn => btn.onclick = () => { view = 'home'; render(); });
  app.querySelectorAll('[data-action="backCuisine"]').forEach(btn => btn.onclick = () => { expandedRecipe = null; view = 'cuisine'; render(); });

  app.querySelectorAll('.stamp-group').forEach(group => {
    const ing = group.dataset.ing;
    group.querySelectorAll('.stamp').forEach(stampBtn => {
      stampBtn.onclick = async () => {
        const ans = answersByProfile[surveyProfileId] || (answersByProfile[surveyProfileId] = {});
        const rating = parseInt(stampBtn.dataset.rating, 10);
        if(ans[ing] === rating){ delete ans[ing]; } // clicking the active rating again clears it
        else { ans[ing] = rating; }
        await saveAnswers(surveyProfileId);
        render();
      };
    });
  });

  const finishBtn = app.querySelector('[data-action="finishSurvey"]');
  if(finishBtn) finishBtn.onclick = () => { view = 'home'; render(); };

  function captureFilters(){
    const timeSel = $('#filterTime');
    const budgetSel = $('#filterBudget');
    selectedMaxTime = timeSel && timeSel.value ? parseInt(timeSel.value, 10) : null;
    selectedBudget = budgetSel && budgetSel.value ? budgetSel.value : null;
  }

  app.querySelectorAll('[data-action="pickCuisine"]').forEach(btn => btn.onclick = () => {
    captureFilters();
    selectedCuisine = btn.dataset.cuisine;
    expandedRecipe = null;
    view = 'results';
    render();
    loadResultsFor(selectedCuisine, false);
  });

  const customCuisineBtn = app.querySelector('[data-action="pickCustomCuisine"]');
  if(customCuisineBtn) customCuisineBtn.onclick = () => {
    const input = $('#customCuisine');
    const val = (input.value || '').trim();
    if(!val) return;
    captureFilters();
    selectedCuisine = val;
    expandedRecipe = null;
    view = 'results';
    render();
    loadResultsFor(selectedCuisine, false);
  };
  const customCuisineInput = $('#customCuisine');
  if(customCuisineInput){
    customCuisineInput.onkeydown = (e) => { if(e.key === 'Enter'){ app.querySelector('[data-action="pickCustomCuisine"]').click(); } };
  }

  const showMoreBtn = app.querySelector('[data-action="showMore"]');
  if(showMoreBtn) showMoreBtn.onclick = () => {
    expandedRecipe = null;
    loadResultsFor(selectedCuisine, true);
  };

  const retryBtn = app.querySelector('[data-action="retryResults"]');
  if(retryBtn) retryBtn.onclick = () => { loadResultsFor(selectedCuisine, false); };

  app.querySelectorAll('[data-action="openRecipe"]').forEach(card => card.onclick = () => {
    expandedRecipe = parseInt(card.dataset.idx, 10);
    render();
  });
  app.querySelectorAll('[data-action="closeRecipe"]').forEach(card => card.onclick = (e) => {
    expandedRecipe = null;
    render();
  });
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============ INIT ============ */
loadAll();
